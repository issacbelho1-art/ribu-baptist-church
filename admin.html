<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | Ribu Baptist Church</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="admin.css">
</head>

<body>

<header class="hero small-hero">

    <nav class="navbar">
        <div class="logo">
            <img src="images/logo.jpeg" alt="Logo">
            <span>Ribu Baptist Church</span>
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </nav>

    <div class="hero-content center">
        <h1>Admin Dashboard</h1>
        <p>Join Requests Overview</p>
    </div>

    <!-- ✔ Logout button (handled by admin-auth.js) -->
    <button id="logoutBtn">Logout</button>

</header>
<section class="admin-container">

    <h2 class="admin-title">All Join Requests</h2>

    <button onclick="exportPDF('joinRequests')">Export Join Requests</button>
<button onclick="exportPDF('prayers')">Export Prayers</button>
<button onclick="exportPDF('donations')">Export Donations</button>

    <div id="requestsContainer">
        <p>Loading data...</p>
    </div>

</section>

<!-- PDF LIBRARIES FIRST -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<!-- YOUR FILES -->
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/admin.js"></script>
<script type="module" src="js/admin-auth.js"></script></body>
</html>
